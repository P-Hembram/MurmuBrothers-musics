<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Access Portal</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
      }

      .container {
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      h2 {
        color: #333;
        margin-bottom: 25px;
      }

      .input-group {
        margin-bottom: 15px;
        text-align: left;
        position: relative;
      }

      label {
        display: block;
        margin-bottom: 5px;
        color: #666;
        font-size: 14px;
      }

      input {
        width: 100%;
        padding: 12px;
        padding-right: 40px; /* Space for the icon */
        border: 2px solid #eee;
        border-radius: 8px;
        outline: none;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      input:focus {
        border-color: #764ba2;
      }

      /* Positioning the eye icon */
      .toggle-password {
        position: absolute;
        right: 12px;
        top: 38px;
        color: #777;
        cursor: pointer;
        transition: color 0.3s;
      }

      .toggle-password:hover {
        color: #764ba2;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #764ba2;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
      }

      .toggle-link {
        margin-top: 20px;
        font-size: 14px;
        color: #666;
      }

      .toggle-link span {
        color: #764ba2;
        cursor: pointer;
        font-weight: bold;
      }

      .button1 {
        background-color: #764BA2;
        color: rgb(255, 255, 255);
        padding: 5px 10px;
        text-align: center;
        text-decoration: none;
        font-size: 10px;
        width: 80px;
        border-radius: 5px;
       cursor: pointer;
       
      }

      #message {
        margin-top: 15px;
        font-size: 14px;
        min-height: 20px;
      }
      .error {
        color: #e74c3c;
      }
      .success {
        color: #27ae60;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="login-section">
        <h2>Member Login</h2>
        <div class="input-group">
          <label>Gmail Address</label>
          <input  type="email" id="login-email" placeholder="example@gmail.com" />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="login-pass"  />
          <i class="fas fa-eye toggle-password"  onclick="togglePassword('login-pass', this)"
          ></i>
        </div>
        <button onclick="handleLogin()">Sign In</button>
        <p class="toggle-link">
          New here? <span onclick="toggleForm()">Create an account</span>
        </p>
      </div>

      <div id="register-section" class="hidden">
        <h2>New Registration</h2>
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Enter your name" />
        </div>
        <div class="input-group">
          <label>Gmail Address</label>
          <input type="email" id="reg-email" placeholder="newuser@gmail.com" />
        </div>
        <div class="input-group">
          <label>Create Password</label>
          <input type="password" id="reg-pass" placeholder="••••••••" />
          <i
            class="fas fa-eye toggle-password"
            onclick="togglePassword('reg-pass', this)"
          ></i>
        </div>
        <button onclick="handleRegister()">Register Now</button>
        <p class="toggle-link">
          Already have an account? <span onclick="toggleForm()">Login</span>
        </p>
      </div>

      <div id="message"></div>

      <div><a href="index.html" class="button1">Back To Home</a></div>
    </div>

    <script>
      const defaultUsers = [
        { email: "ajit@gmail.com", pass: "@12345#" },
        { email: "pradeep@gmail.com", pass: "@12345#" },
        { email: "prakash@gmail.com", pass: "@12345#" },
      ];

      let users = JSON.parse(localStorage.getItem("web_users")) || defaultUsers;

      // Toggle visibility function
      function togglePassword(inputId, icon) {
        const passwordInput = document.getElementById(inputId);
        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          icon.classList.remove("fa-eye");
          icon.classList.add("fa-eye-slash");
        } else {
          passwordInput.type = "password";
          icon.classList.remove("fa-eye-slash");
          icon.classList.add("fa-eye");
        }
      }

      function toggleForm() {
        document.getElementById("login-section").classList.toggle("hidden");
        document.getElementById("register-section").classList.toggle("hidden");
        document.getElementById("message").innerHTML = "";
      }

      function handleLogin() {
        const email = document.getElementById("login-email").value.trim();
        const pass = document.getElementById("login-pass").value;
        const msg = document.getElementById("message");

        const foundUser = users.find(
          (u) => u.email === email && u.pass === pass,
        );

        if (foundUser) {
          msg.innerHTML =
            '<span class="success">Success! Redirecting to YouTube...</span>';
          window.location.href = "Dashboard.html";
        } else {
          msg.innerHTML = '<span class="error">Invalid credentials.</span>';
        }
      }

      function handleRegister() {
        const email = document.getElementById("reg-email").value.trim();
        const pass = document.getElementById("reg-pass").value;
        const msg = document.getElementById("message");

        if (!email || !pass) {
          msg.innerHTML = '<span class="error">Please fill all fields.</span>';
          return;
        }

        if (users.some((u) => u.email === email)) {
          msg.innerHTML = '<span class="error">User already exists!</span>';
          return;
        }

        users.push({ email: email, pass: pass });
        localStorage.setItem("web_users", JSON.stringify(users));

        msg.innerHTML =
          '<span class="success">Registration successful! Switch to Login.</span>';
        setTimeout(toggleForm, 1500);
      }
    </script>
  </body>
</html>
